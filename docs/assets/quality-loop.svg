<svg xmlns="http://www.w3.org/2000/svg" width="980" height="340" viewBox="0 0 980 340" role="img" aria-label="翻译质量检查闭环">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
      .title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .text { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .line { fill: none; stroke: #475569; stroke-width: 1.8; marker-end: url(#arrow); }
      .center { fill: #ecfeff; stroke: #06b6d4; stroke-width: 1.5; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="340" rx="18"/>

  <circle class="center" cx="490" cy="170" r="62"/>
  <text class="title" x="490" y="162" text-anchor="middle">中文 TeX</text>
  <text class="text" x="490" y="188" text-anchor="middle">可检查、可编译</text>

  <g transform="translate(108 62)">
    <rect class="node" x="0" y="0" width="206" height="86" rx="12"/>
    <text class="title" x="103" y="34" text-anchor="middle">通读全文</text>
    <text class="text" x="103" y="60" text-anchor="middle">先理解，再动手翻译</text>
  </g>

  <g transform="translate(666 62)">
    <rect class="node" x="0" y="0" width="206" height="86" rx="12"/>
    <text class="title" x="103" y="34" text-anchor="middle">逐段翻译</text>
    <text class="text" x="103" y="60" text-anchor="middle">保留公式、引用、标签</text>
  </g>

  <g transform="translate(666 206)">
    <rect class="node" x="0" y="0" width="206" height="86" rx="12"/>
    <text class="title" x="103" y="34" text-anchor="middle">扫描漏翻</text>
    <text class="text" x="103" y="60" text-anchor="middle">只把提示当作线索</text>
  </g>

  <g transform="translate(108 206)">
    <rect class="node" x="0" y="0" width="206" height="86" rx="12"/>
    <text class="title" x="103" y="34" text-anchor="middle">本地编译</text>
    <text class="text" x="103" y="60" text-anchor="middle">tectonic 产出 PDF</text>
  </g>

  <path class="line" d="M314 105 C380 96 422 112 448 133"/>
  <path class="line" d="M552 133 C580 112 622 96 666 105"/>
  <path class="line" d="M769 148 C792 170 792 194 769 206"/>
  <path class="line" d="M666 249 C622 258 580 244 552 207"/>
  <path class="line" d="M448 207 C422 244 380 258 314 249"/>
  <path class="line" d="M211 206 C188 186 188 158 211 148"/>
</svg>

