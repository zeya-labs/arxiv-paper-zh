<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="论文工作区目录结构">
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .panel { fill: #ffffff; stroke: #d8d1c4; stroke-width: 1.4; }
      .folder { fill: #f59e0b; }
      .folder2 { fill: #fbbf24; }
      .file { fill: #ffffff; stroke: #b6c2cf; stroke-width: 1.2; }
      .title { font: 700 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .code { font: 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1f2937; }
      .note { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
      .tag { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #92400e; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="360" rx="18"/>
  <rect class="panel" x="42" y="34" width="896" height="292" rx="14"/>

  <g transform="translate(82 68)">
    <path class="folder" d="M0 16 h82 l16 18 h170 a10 10 0 0 1 10 10 v164 a10 10 0 0 1 -10 10 H10 a10 10 0 0 1 -10 -10 V26 a10 10 0 0 1 10 -10 z"/>
    <path class="folder2" d="M0 54 h278 v154 a10 10 0 0 1 -10 10 H10 a10 10 0 0 1 -10 -10 z"/>
    <text class="title" x="28" y="96">WorldSplat/</text>
    <text class="note" x="28" y="126">每篇论文一个独立工作区</text>
  </g>

  <g transform="translate(420 64)">
    <text class="code" x="0" y="0">WorldSplat/</text>
    <text class="code" x="22" y="38">source/</text>
    <text class="note" x="170" y="38">原始 LaTeX 源码，尽量不动</text>
    <text class="code" x="22" y="76">source-zh/</text>
    <text class="note" x="170" y="76">中文翻译源码，只改这里</text>
    <text class="code" x="22" y="114">paper.pdf</text>
    <text class="note" x="170" y="114">arXiv 原 PDF</text>
    <text class="code" x="22" y="152">paper-zh.pdf</text>
    <text class="note" x="170" y="152">最终中文 PDF</text>
    <text class="code" x="22" y="190">paper-meta.json</text>
    <text class="note" x="170" y="190">标题、ID、主 TeX 文件</text>
  </g>

  <g transform="translate(420 286)">
    <rect x="0" y="-28" width="182" height="34" rx="17" fill="#fef3c7"/>
    <text class="tag" x="91" y="-6" text-anchor="middle">可对照，可复核，可继续改</text>
  </g>
</svg>

